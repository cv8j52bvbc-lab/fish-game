<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fish Game V3.1</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#7fc7ff;font-family:Arial}
#game{position:fixed;inset:0}
#hud,#toast{position:fixed;color:#fff;background:rgba(0,0,0,.55);padding:10px;border-radius:12px;z-index:10}
#hud{left:10px;top:10px;font-size:14px;line-height:1.5}
#toast{left:50%;top:12%;transform:translateX(-50%);display:none}
#start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(#2784c4,#06142e);z-index:50;color:white}
.card{background:rgba(0,0,0,.6);padding:24px;border-radius:20px;text-align:center;width:440px;max-width:92vw}
button{border-radius:14px;border:1px solid #fff8;background:#0008;color:white;font-weight:bold}
.card button{padding:14px;margin:6px}
.char.sel{background:#fff5}
#go{display:block;width:100%;margin-top:12px}
#controls{position:fixed;left:0;right:0;bottom:14px;height:160px;z-index:20;pointer-events:none}
.pad{position:absolute;left:18px;bottom:0;width:150px;height:150px;pointer-events:auto}
.m{position:absolute;width:50px;height:50px;font-size:22px}
#up{left:50px;top:0}#left{left:0;top:50px}#right{left:100px;top:50px}#down{left:50px;top:100px}
.act{position:absolute;right:18px;bottom:0;width:230px;height:150px;pointer-events:auto}
.act button{position:absolute;width:70px;height:70px}
#view{right:80px;bottom:75px}#sound{right:150px;bottom:0}#jump{right:75px;bottom:0}#run{right:0;bottom:0}
</style>
</head>
<body>
<div id="game"></div><div id="hud"></div><div id="toast"></div>
<div id="start"><div class="card">
<h1>파도 너머의 약초섬 V3.1</h1>
<p>작은 3D 캐릭터 · 3인칭/1인칭 · 소리</p>
<button class="char sel" data-name="승혁" data-color="#2f80ed">승혁</button>
<button class="char" data-name="도윤" data-color="#27ae60">도윤</button>
<button class="char" data-name="강이" data-color="#eb5757">강이</button>
<button id="go">게임 시작</button>
</div></div>
<div id="controls">
<div class="pad"><button class="m" id="up">▲</button><button class="m" id="left">◀</button><button class="m" id="right">▶</button><button class="m" id="down">▼</button></div>
<div class="act"><button id="view">시점</button><button id="sound">소리</button><button id="jump">점프</button><button id="run">달리기</button></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let run=false,fp=false,soundOn=true,started=false,sel={name:'승혁',color:'#2f80ed'},mv={u:0,d:0,l:0,r:0,run:0},toastT=0,jv=0,ground=1;
const $=id=>document.getElementById(id);
function say(t){$('toast').innerHTML=t;$('toast').style.display='block';toastT=120;beep(520,.04)}
let ac;function beep(f=440,d=.08){if(!soundOn)return;try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();let o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;g.gain.value=.035;o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function hud(){$('hud').innerHTML='캐릭터: '+sel.name+'<br>시점: '+(fp?'1인칭':'3인칭')+'<br>소리: '+(soundOn?'ON':'OFF')+'<br>달리기: '+(mv.run?'ON':'OFF')+'<br>V3.1 테스트'}
const scene=new THREE.Scene();scene.background=new THREE.Color(0x8fd3ff);scene.fog=new THREE.Fog(0x8fd3ff,50,220);
const cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,500),ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(Math.min(devicePixelRatio,2));$('game').appendChild(ren.domElement);
onresize=()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)};
scene.add(new THREE.HemisphereLight(0xffffff,0x335533,1.7));
let sun=new THREE.DirectionalLight(0xffffff,2);sun.position.set(30,60,20);scene.add(sun);
function mat(c){return new THREE.MeshStandardMaterial({color:new THREE.Color(c),roughness:.65})}
let seaG=new THREE.PlaneGeometry(180,180,50,50),sea=new THREE.Mesh(seaG,new THREE.MeshStandardMaterial({color:0x0b78b8,roughness:.3,metalness:.1}));sea.rotation.x=-Math.PI/2;scene.add(sea);
let island=new THREE.Mesh(new THREE.CylinderGeometry(18,20,3,48),mat('#9fcf63'));island.position.y=.5;scene.add(island);
let sand=new THREE.Mesh(new THREE.CylinderGeometry(21,23,1,48),mat('#d8bd78'));sand.position.y=.05;scene.add(sand);
function tree(x,z){let g=new THREE.Group(),tr=new THREE.Mesh(new THREE.CylinderGeometry(.25,.4,3,8),mat('#6b3d1f')),le=new THREE.Mesh(new THREE.ConeGeometry(1.7,4,10),mat('#26a65b'));tr.position.y=2;le.position.y=5;g.add(tr,le);g.position.set(x,0,z);scene.add(g)}
for(let i=0;i<14;i++){let a=i*Math.PI*2/14;tree(Math.cos(a)*13,Math.sin(a)*13)}
let player=new THREE.Object3D();player.position.set(0,3,0);scene.add(player);let model,legs=[];
function makeChar(){if(model)scene.remove(model);let g=new THREE.Group();
let body=new THREE.Mesh(new THREE.BoxGeometry(.85,1.3,.5),mat(sel.color));body.position.y=1.55;
let head=new THREE.Mesh(new THREE.SphereGeometry(.42,16,16),mat('#f2c6a0'));head.position.y=2.5;
let hair=new THREE.Mesh(new THREE.SphereGeometry(.44,16,8),mat('#3a2113'));hair.position.y=2.73;hair.scale.y=.42;
let l1=new THREE.Mesh(new THREE.BoxGeometry(.22,.72,.22),mat('#263238')),l2=l1.clone();l1.position.set(-.22,.65,0);l2.position.set(.22,.65,0);legs=[l1,l2];
g.add(body,head,hair,l1,l2);g.scale.set(.85,.85,.85);scene.add(g);model=g}
makeChar();
document.querySelectorAll('.char').forEach(b=>b.onclick=()=>{document.querySelectorAll('.char').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');sel={name:b.dataset.name,color:b.dataset.color};makeChar();hud();beep()});
$('go').onclick=()=>{started=true;$('start').style.display='none';hud();say('V3.1 시작!')};
$('view').onclick=()=>{fp=!fp;say(fp?'1인칭':'3인칭');hud()};
$('sound').onclick=()=>{soundOn=!soundOn;say(soundOn?'소리 ON':'소리 OFF');hud()};
$('jump').onclick=()=>{if(ground){jv=.16;ground=0;beep(700,.06)}};
$('run').onclick=()=>{mv.run=!mv.run;hud();say(mv.run?'달리기 ON':'달리기 OFF')};
function hold(id,k){let e=$(id),on=x=>{x.preventDefault();mv[k]=1},off=x=>{x.preventDefault();mv[k]=0};['touchstart','mousedown'].forEach(v=>e.addEventListener(v,on));['touchend','mouseup','mouseleave'].forEach(v=>e.addEventListener(v,off))}
hold('up','u');hold('down','d');hold('left','l');hold('right','r');
document.addEventListener('keydown',e=>{let k=e.key.toUpperCase();if(k=='W')mv.u=1;if(k=='S')mv.d=1;if(k=='A')mv.l=1;if(k=='D')mv.r=1;if(k=='SHIFT')mv.run=1;if(k=='V')$('view').click();if(k==' ')$('jump').click()});
document.addEventListener('keyup',e=>{let k=e.key.toUpperCase();if(k=='W')mv.u=0;if(k=='S')mv.d=0;if(k=='A')mv.l=0;if(k=='D')mv.r=0;if(k=='SHIFT')mv.run=0});
let t=0,step=0;function loop(){requestAnimationFrame(loop);t+=.016;
let p=sea.geometry.attributes.position;for(let i=0;i<p.count;i++){let x=p.getX(i),y=p.getY(i);p.setZ(i,Math.sin(x*.12+t*2)*.25+Math.cos(y*.08+t*1.5)*.2)}p.needsUpdate=true;
if(started){let dx=(mv.r?1:0)-(mv.l?1:0),dz=(mv.d?1:0)-(mv.u?1:0);if(dx||dz){let l=Math.hypot(dx,dz),sp=mv.run?.1:.06;player.position.x+=dx/l*sp;player.position.z+=dz/l*sp;player.rotation.y=Math.atan2(dx,dz);step+=.16;if(Math.floor(step*10)%10==0)beep(160,.02);legs[0].rotation.x=Math.sin(step*6)*.7;legs[1].rotation.x=-Math.sin(step*6)*.7}else{legs[0].rotation.x*=.8;legs[1].rotation.x*=.8}
if(!ground){player.position.y+=jv;jv-=.01;if(player.position.y<=3){player.position.y=3;ground=1;jv=0}}}
if(model){model.position.copy(player.position);model.rotation.y=player.rotation.y;model.visible=!fp}
let f=new THREE.Vector3(Math.sin(player.rotation.y),0,Math.cos(player.rotation.y));
if(fp){cam.position.lerp(new THREE.Vector3(player.position.x,player.position.y+2.1,player.position.z),.18);cam.lookAt(player.position.x+f.x*10,player.position.y+1.8,player.position.z+f.z*10)}
else{cam.position.lerp(new THREE.Vector3(player.position.x-f.x*6,player.position.y+4.5,player.position.z-f.z*8),.1);cam.lookAt(player.position.x,player.position.y+1.4,player.position.z)}
if(toastT>0){toastT--;if(toastT<=0)$('toast').style.display='none'}
ren.render(scene,cam)}
hud();loop();
</script>
</body></html>
