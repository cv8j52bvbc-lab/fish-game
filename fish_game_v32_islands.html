<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fish Game V3.2 Islands</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#7fc7ff;font-family:Arial}
*{box-sizing:border-box;user-select:none;touch-action:none}
#game{position:fixed;inset:0}
#hud,#toast{position:fixed;color:#fff;background:rgba(0,0,0,.55);padding:10px;border-radius:12px;z-index:10}
#hud{left:10px;top:10px;font-size:14px;line-height:1.5}
#toast{left:50%;top:12%;transform:translateX(-50%);display:none;text-align:center}
#start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(#2784c4,#06142e);z-index:50;color:white}
.card{background:rgba(0,0,0,.62);padding:24px;border-radius:20px;text-align:center;width:440px;max-width:92vw}
button{border-radius:14px;border:1px solid #fff8;background:#0008;color:white;font-weight:bold}
.card button{padding:14px;margin:6px}
.char.sel{background:#fff5}
#go{display:block;width:100%;margin-top:12px}
#controls{position:fixed;left:0;right:0;bottom:14px;height:160px;z-index:20;pointer-events:none}
.pad{position:absolute;left:18px;bottom:0;width:150px;height:150px;pointer-events:auto}
.m{position:absolute;width:50px;height:50px;font-size:22px}
#up{left:50px;top:0}#left{left:0;top:50px}#right{left:100px;top:50px}#down{left:50px;top:100px}
.act{position:absolute;right:18px;bottom:0;width:300px;height:150px;pointer-events:auto}
.act button{position:absolute;width:70px;height:70px}
#view{right:150px;bottom:75px}#sound{right:225px;bottom:0}#jump{right:150px;bottom:0}#run{right:75px;bottom:0}#map{right:0;bottom:0}
#mapPanel{position:fixed;right:10px;top:10px;color:white;background:rgba(0,0,0,.55);padding:10px;border-radius:12px;z-index:15;display:none;font-size:13px;line-height:1.5}
</style>
</head>
<body>
<div id="game"></div><div id="hud"></div><div id="toast"></div><div id="mapPanel"></div>
<div id="start"><div class="card">
<h1>파도 너머의 약초섬 V3.2</h1>
<p>섬 업데이트: 특수 섬 랜덤 생성</p>
<button class="char sel" data-name="승혁" data-color="#2f80ed">승혁</button>
<button class="char" data-name="도윤" data-color="#27ae60">도윤</button>
<button class="char" data-name="강이" data-color="#eb5757">강이</button>
<button id="go">게임 시작</button>
</div></div>
<div id="controls">
<div class="pad"><button class="m" id="up">▲</button><button class="m" id="left">◀</button><button class="m" id="right">▶</button><button class="m" id="down">▼</button></div>
<div class="act"><button id="view">시점</button><button id="sound">소리</button><button id="jump">점프</button><button id="run">달리기</button><button id="map">지도</button></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let started=false,fp=false,soundOn=true,sel={name:'승혁',color:'#2f80ed'},mv={u:0,d:0,l:0,r:0,run:0},toastT=0,jv=0,ground=1,mapOpen=false;
const $=id=>document.getElementById(id);
function say(t){$('toast').innerHTML=t;$('toast').style.display='block';toastT=130;beep(520,.04)}
let ac;function beep(f=440,d=.08){if(!soundOn)return;try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();let o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;g.gain.value=.035;o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function nearIsland(){let best=null,bd=999;for(let i of islands){let d=Math.hypot(player.position.x-i.x,player.position.z-i.z);if(d<i.r+3&&d<bd){best=i;bd=d}}return best}
function hud(){let n=nearIsland();$('hud').innerHTML='캐릭터: '+sel.name+'<br>위치: '+(n?n.name:'바다')+'<br>시점: '+(fp?'1인칭':'3인칭')+'<br>소리: '+(soundOn?'ON':'OFF')+'<br>달리기: '+(mv.run?'ON':'OFF')+'<br>V3.2 섬 테스트'}
function updateMap(){let txt='<b>섬 목록</b><br>';for(let i of islands){let d=Math.round(Math.hypot(player.position.x-i.x,player.position.z-i.z));txt+=i.icon+' '+i.name+' · '+d+'m<br>'}$('mapPanel').innerHTML=txt}
const scene=new THREE.Scene();scene.background=new THREE.Color(0x8fd3ff);scene.fog=new THREE.Fog(0x8fd3ff,70,360);
const cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,600),ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(Math.min(devicePixelRatio,2));ren.shadowMap.enabled=true;$('game').appendChild(ren.domElement);
onresize=()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)};
scene.add(new THREE.HemisphereLight(0xffffff,0x335533,1.7));let sun=new THREE.DirectionalLight(0xffffff,2);sun.position.set(50,80,30);scene.add(sun);
function mat(c){return new THREE.MeshStandardMaterial({color:new THREE.Color(c),roughness:.65})}
let seaG=new THREE.PlaneGeometry(420,420,80,80),sea=new THREE.Mesh(seaG,new THREE.MeshStandardMaterial({color:0x0b78b8,roughness:.3,metalness:.1}));sea.rotation.x=-Math.PI/2;scene.add(sea);
let islands=[];
function tree(parent,x,z,color='#26a65b'){let g=new THREE.Group(),tr=new THREE.Mesh(new THREE.CylinderGeometry(.22,.38,2.8,8),mat('#6b3d1f')),le=new THREE.Mesh(new THREE.ConeGeometry(1.5,3.6,10),mat(color));tr.position.y=1.5;le.position.y=4;g.add(tr,le);g.position.set(x,1,z);parent.add(g)}
function rock(parent,x,z){let r=new THREE.Mesh(new THREE.DodecahedronGeometry(1.1,0),mat('#7f8c8d'));r.position.set(x,1.4,z);r.scale.set(1.5,.8,1.2);parent.add(r)}
function sign(parent,textColor='#7a4d28'){let s=new THREE.Mesh(new THREE.BoxGeometry(2.7,.25,1.1),mat(textColor));s.position.set(0,3.3,0);parent.add(s);let p=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,2.4,8),mat('#5b3417'));p.position.set(0,2,0);parent.add(p)}
function island(name,type,x,z,r,color,icon){let g=new THREE.Group();g.position.set(x,0,z);let base=new THREE.Mesh(new THREE.CylinderGeometry(r,r*1.12,3,48),mat(color));base.position.y=.8;g.add(base);let sand=new THREE.Mesh(new THREE.CylinderGeometry(r*1.12,r*1.22,.8,48),mat('#d8bd78'));sand.position.y=.15;g.add(sand);
let leaf= type=='hacker'?'#00ff66':type=='glitch'?'#ff46ff':type=='dawn'?'#7eeaff':type=='moon'?'#f8f1cf':'#26a65b';
for(let k=0;k<8;k++){let a=k*Math.PI*2/8;tree(g,Math.cos(a)*r*.55,Math.sin(a)*r*.55,leaf)}
if(type=='home'){let h=new THREE.Mesh(new THREE.BoxGeometry(5,3.5,4),mat('#8b4b2b'));h.position.y=3.8;g.add(h)}
if(type=='kte'){let tr=new THREE.Mesh(new THREE.BoxGeometry(9,2.5,3.5),mat('#1d4ed8'));tr.position.y=3.5;g.add(tr)}
if(type=='shop'){let npc=new THREE.Mesh(new THREE.CylinderGeometry(.8,.8,3,16),mat('#f2c6a0'));npc.position.y=3;g.add(npc);let hat=new THREE.Mesh(new THREE.ConeGeometry(1.4,1.1,16),mat('#5b3417'));hat.position.y=4.8;g.add(hat)}
if(type=='lonely'){sign(g);rock(g,3,2);rock(g,-4,-2)}
if(type=='glitch'){let sp=new THREE.Mesh(new THREE.BoxGeometry(3,3,3),mat('#00ffee'));sp.position.y=5;sp.rotation.y=.7;g.add(sp)}
if(type=='moon'){let moon=new THREE.Mesh(new THREE.SphereGeometry(1.2,16,16),mat('#fff2a6'));moon.position.set(0,6,0);g.add(moon)}
scene.add(g);islands.push({name,type,x,z,r,icon,g})}
function randomSpot(existing){for(let tries=0;tries<200;tries++){let x=(Math.random()-.5)*300,z=(Math.random()-.5)*300,ok=Math.hypot(x,z)>65;for(let e of existing){if(Math.hypot(x-e[0],z-e[1])<48)ok=false}if(ok)return [x,z]}return[(Math.random()-.5)*260,(Math.random()-.5)*260]}
let fixed=[[0,0],[35,-15],[25,28],[62,-25]];
island('시작섬','home',0,0,17,'#9fcf63','🏠');island('항구섬','port',35,-15,15,'#d6b171','⚓');island('상점섬','shop',25,28,12,'#d6b171','👴');island('KTE섬','kte',62,-25,11,'#e9eef7','🚆');
let specs=[['회복섬','recovery','#55df75','💚'],['달빛섬','moon','#e8dda3','🌕'],['새벽섬','dawn','#67d7ff','🌅'],['해커섬','hacker','#00d866','🟢'],['글리치섬','glitch','#7e4bff','🟣'],['외딴섬','lonely','#b7a16b','🏝️']];
for(let s of specs){let p=randomSpot(fixed);fixed.push(p);island(s[0],s[1],p[0],p[1],12,s[2],s[3])}
let player=new THREE.Object3D();player.position.set(0,4,0);scene.add(player);let model,legs=[];
function makeChar(){if(model)scene.remove(model);let g=new THREE.Group();let body=new THREE.Mesh(new THREE.BoxGeometry(.85,1.3,.5),mat(sel.color));body.position.y=1.55;let head=new THREE.Mesh(new THREE.SphereGeometry(.42,16,16),mat('#f2c6a0'));head.position.y=2.5;let hair=new THREE.Mesh(new THREE.SphereGeometry(.44,16,8),mat('#3a2113'));hair.position.y=2.73;hair.scale.y=.42;let l1=new THREE.Mesh(new THREE.BoxGeometry(.22,.72,.22),mat('#263238')),l2=l1.clone();l1.position.set(-.22,.65,0);l2.position.set(.22,.65,0);legs=[l1,l2];g.add(body,head,hair,l1,l2);g.scale.set(.85,.85,.85);scene.add(g);model=g}
makeChar();
document.querySelectorAll('.char').forEach(b=>b.onclick=()=>{document.querySelectorAll('.char').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');sel={name:b.dataset.name,color:b.dataset.color};makeChar();hud();beep()});
$('go').onclick=()=>{started=true;$('start').style.display='none';hud();say('V3.2 섬 업데이트 시작!')};
$('view').onclick=()=>{fp=!fp;say(fp?'1인칭':'3인칭');hud()};
$('sound').onclick=()=>{soundOn=!soundOn;say(soundOn?'소리 ON':'소리 OFF');hud()};
$('jump').onclick=()=>{if(ground){jv=.16;ground=0;beep(700,.06)}};
$('run').onclick=()=>{mv.run=!mv.run;hud();say(mv.run?'달리기 ON':'달리기 OFF')};
$('map').onclick=()=>{mapOpen=!mapOpen;$('mapPanel').style.display=mapOpen?'block':'none';updateMap();beep()};
function hold(id,k){let e=$(id),on=x=>{x.preventDefault();mv[k]=1},off=x=>{x.preventDefault();mv[k]=0};['touchstart','mousedown'].forEach(v=>e.addEventListener(v,on));['touchend','mouseup','mouseleave'].forEach(v=>e.addEventListener(v,off))}
hold('up','u');hold('down','d');hold('left','l');hold('right','r');
document.addEventListener('keydown',e=>{let k=e.key.toUpperCase();if(k=='W')mv.u=1;if(k=='S')mv.d=1;if(k=='A')mv.l=1;if(k=='D')mv.r=1;if(k=='SHIFT')mv.run=1;if(k=='V')$('view').click();if(k==' ')$('jump').click();if(k=='M')$('map').click()});
document.addEventListener('keyup',e=>{let k=e.key.toUpperCase();if(k=='W')mv.u=0;if(k=='S')mv.d=0;if(k=='A')mv.l=0;if(k=='D')mv.r=0;if(k=='SHIFT')mv.run=0});
let t=0,step=0;function loop(){requestAnimationFrame(loop);t+=.016;if(Math.random()<.01)beep(95,.04);
let p=sea.geometry.attributes.position;for(let i=0;i<p.count;i++){let x=p.getX(i),y=p.getY(i);p.setZ(i,Math.sin(x*.1+t*2)*.3+Math.cos(y*.08+t*1.5)*.22)}p.needsUpdate=true;
if(started){let dx=(mv.r?1:0)-(mv.l?1:0),dz=(mv.d?1:0)-(mv.u?1:0);if(dx||dz){let l=Math.hypot(dx,dz),sp=mv.run?.18:.1;player.position.x+=dx/l*sp;player.position.z+=dz/l*sp;player.rotation.y=Math.atan2(dx,dz);step+=.16;legs[0].rotation.x=Math.sin(step*6)*.7;legs[1].rotation.x=-Math.sin(step*6)*.7}else{legs[0].rotation.x*=.8;legs[1].rotation.x*=.8}if(!ground){player.position.y+=jv;jv-=.01;if(player.position.y<=4){player.position.y=4;ground=1;jv=0}}}
if(model){model.position.copy(player.position);model.rotation.y=player.rotation.y;model.visible=!fp}
let f=new THREE.Vector3(Math.sin(player.rotation.y),0,Math.cos(player.rotation.y));if(fp){cam.position.lerp(new THREE.Vector3(player.position.x,player.position.y+2.1,player.position.z),.18);cam.lookAt(player.position.x+f.x*12,player.position.y+1.8,player.position.z+f.z*12)}else{cam.position.lerp(new THREE.Vector3(player.position.x-f.x*9,player.position.y+6,player.position.z-f.z*11),.1);cam.lookAt(player.position.x,player.position.y+1.5,player.position.z)}
if(toastT>0){toastT--;if(toastT<=0)$('toast').style.display='none'}if(mapOpen)updateMap();hud();ren.render(scene,cam)}
hud();loop();
</script>
</body></html>
